# Creates standard_user with global and project role bindings.
# Idempotent — skips gracefully if resources already exist.
# Fatal on recurring jobs; warns and continues on existing jobs.

- name: Login as admin
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3-public/localProviders/local?action=login"
    method: POST
    body_format: json
    body:
      username: admin
      password: "{{ rancher_password }}"
    validate_certs: false
    status_code: [200, 201]
  register: admin_login

- name: Set admin token
  ansible.builtin.set_fact:
    rancher_token: "{{ admin_login.json.token }}"

- name: Create standard_user
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3/users"
    method: POST
    body_format: json
    body:
      enabled: true
      mustChangePassword: false
      password: "{{ rancher_password }}"
      username: standard_user
    headers:
      Authorization: "Bearer {{ rancher_token }}"
    validate_certs: false
    status_code: [200, 201, 409, 422]
  register: create_user

- name: Look up standard_user ID
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3/users?username=standard_user"
    method: GET
    headers:
      Authorization: "Bearer {{ rancher_token }}"
    validate_certs: false
  register: user_lookup

- name: Set standard_user ID
  ansible.builtin.set_fact:
    standard_user_id: "{{ user_lookup.json.data[0].id }}"
  when: user_lookup.json.data | length > 0

- name: Create global role binding
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3/globalrolebindings"
    method: POST
    body_format: json
    body:
      globalRoleId: user
      type: globalRoleBinding
      userId: "{{ standard_user_id }}"
    headers:
      Authorization: "Bearer {{ rancher_token }}"
    validate_certs: false
    status_code: [200, 201, 409, 422]
  when: standard_user_id is defined

- name: Get Default project ID
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3/projects?name=Default&clusterId=local"
    method: GET
    headers:
      Authorization: "Bearer {{ rancher_token }}"
    validate_certs: false
  register: default_project
  when: standard_user_id is defined

- name: Create project role binding
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3/projectroletemplatebindings"
    method: POST
    body_format: json
    body:
      type: projectroletemplatebinding
      roleTemplateId: project-member
      projectId: "{{ default_project.json.data[0].id }}"
      userId: "{{ standard_user_id }}"
    headers:
      Authorization: "Bearer {{ rancher_token }}"
    validate_certs: false
    status_code: [200, 201, 409, 422]
  when:
    - standard_user_id is defined
    - default_project.json.data | default([]) | length > 0

- name: Verify standard_user login
  ansible.builtin.uri:
    url: "https://{{ rancher_host }}/v3-public/localProviders/local?action=login"
    method: POST
    body_format: json
    body:
      username: standard_user
      password: "{{ rancher_password }}"
    validate_certs: false
    status_code: [200, 201]
  register: user_verify
  failed_when: false

- name: Fail if standard_user is missing on recurring jobs
  ansible.builtin.fail:
    msg: "standard_user could not be created or verified — aborting recurring job."
  when:
    - job_type == 'recurring'
    - user_verify.status | default(0) not in [200, 201]

- name: Warn if standard_user is missing on existing jobs
  ansible.builtin.debug:
    msg: >-
      WARNING: standard_user login failed (status={{ user_verify.status | default('unknown') }}).
      Tests tagged @standardUser will fail. Create the user 'standard_user' manually
      or switch to job_type=recurring.
  when:
    - job_type != 'recurring'
    - user_verify.status | default(0) not in [200, 201]
