# Resolve which Helm chart version and container image to deploy.
# Prime repos use a two-repo strategy (chart from rancher-prime, image tag
# from a staging repo). Community repos are self-contained.
# See README.md "Helm Repos and Image Resolution" for details.

- name: Map helm repo to chart and image configuration
  ansible.builtin.set_fact:
    # Helm repo strategy:
    #   Prime repos (rancher-prime, rancher-latest, rancher-alpha) always install the
    #   chart from rancher-prime (charts.rancher.com). Staging repos are added separately
    #   only to resolve the correct RC/alpha image tag.
    #   Community repos (rancher-community, rancher-com-rc, rancher-com-alpha) are
    #   self-contained — chart and image come from the same repo.
    #
    # See README.md "Helm Repos and Image Resolution" for examples.
    rancher_chart_url: >-
      {%- if rancher_helm_repo in ['rancher-prime', 'rancher-latest', 'rancher-alpha'] -%}
        https://charts.rancher.com/server-charts/prime
      {%- elif rancher_helm_repo == 'rancher-com-alpha' -%}
        https://releases.rancher.com/server-charts/alpha
      {%- elif rancher_helm_repo == 'rancher-community' -%}
        https://releases.rancher.com/server-charts/stable
      {%- else -%}
        https://releases.rancher.com/server-charts/latest
      {%- endif -%}
    rancher_chart_repo: >-
      {%- if rancher_helm_repo in ['rancher-prime', 'rancher-latest', 'rancher-alpha'] -%}
        rancher-prime
      {%- elif rancher_helm_repo == 'rancher-com-alpha' -%}
        rancher-com-alpha
      {%- elif rancher_helm_repo == 'rancher-community' -%}
        rancher-community
      {%- else -%}
        rancher-com-rc
      {%- endif -%}
    rancher_image: >-
      {%- if rancher_helm_repo == 'rancher-prime' -%}
        registry.suse.com/rancher/rancher
      {%- elif rancher_helm_repo in ['rancher-latest', 'rancher-alpha'] -%}
        stgregistry.suse.com/rancher/rancher
      {%- else -%}
      {%- endif -%}

- name: Add chart helm repo
  ansible.builtin.command:
    cmd: "helm repo add {{ rancher_chart_repo }} {{ rancher_chart_url }}"
  changed_when: false
  failed_when: false

- name: Add staging helm repo for image tag resolution
  ansible.builtin.command:
    cmd: >-
      helm repo add {{ rancher_helm_repo }}
      {{ 'https://charts.optimus.rancher.io/server-charts/latest'
         if rancher_helm_repo == 'rancher-latest'
         else 'https://charts.optimus.rancher.io/server-charts/alpha' }}
  changed_when: false
  failed_when: false
  when: rancher_helm_repo in ['rancher-latest', 'rancher-alpha']

- name: Update helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Extract version string from image tag
  ansible.builtin.set_fact:
    version_string: "{{ rancher_image_tag | regex_replace('-.*$', '') }}"

- name: Resolve Rancher chart version from install repo
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      TAG="{{ rancher_image_tag }}"
      REPO="{{ rancher_chart_repo }}"
      VS="{{ version_string }}"
      SEARCH=$(helm search repo "${REPO}" --devel --versions)

      if [[ "${TAG}" == "head" ]]; then
        echo "${SEARCH}" | sed -n '1!p' | head -1 \
          | awk '{print $2}' | tr -d '[:space:]'
      elif [[ "{{ rancher_helm_repo }}" == "rancher-latest" ]] || \
           [[ "{{ rancher_helm_repo }}" == "rancher-alpha" ]]; then
        # For prime staging repos, find chart by major.minor from rancher-prime
        MAJOR_MINOR=$(echo "${VS}" | sed 's/^v//' | cut -d. -f1-2)
        echo "${SEARCH}" | grep "^${REPO}/rancher[[:space:]]" \
          | grep "${MAJOR_MINOR}" | head -n 1 \
          | awk '{print $2}' | tr -d '[:space:]'
      else
        echo "${SEARCH}" | grep "${VS}" \
          | awk '{print $2}' | sort -V | tail -1 | tr -d '[:space:]'
      fi
    executable: /bin/bash
  register: helm_version_result
  changed_when: false
  failed_when: helm_version_result.stdout | trim == ''

- name: Set rancher_version
  ansible.builtin.set_fact:
    rancher_version: "{{ helm_version_result.stdout | trim }}"

- name: Resolve image tag from staging repo
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      VS="{{ version_string }}"
      REPO="{{ rancher_helm_repo }}"
      SEARCH=$(helm search repo "${REPO}" --devel --versions)

      if [[ "${REPO}" == "rancher-alpha" ]]; then
        echo "${SEARCH}" | grep "^${REPO}/rancher[[:space:]]" \
          | grep "${VS}" | grep -- "-alpha" \
          | awk '{print $2}' | sort -V | tail -1 | tr -d '[:space:]'
      else
        echo "${SEARCH}" | grep "^${REPO}/rancher[[:space:]]" \
          | grep "${VS}" | grep -- "-rc" \
          | awk '{print $2}' | sort -V | tail -1 | tr -d '[:space:]'
      fi
    executable: /bin/bash
  register: staging_image_version
  changed_when: false
  failed_when: staging_image_version.stdout | trim == ''
  when: rancher_helm_repo in ['rancher-latest', 'rancher-alpha']

- name: Set resolved image tag
  ansible.builtin.set_fact:
    rancher_image_tag_resolved: >-
      {%- if rancher_helm_repo == 'rancher-prime' -%}
        v{{ rancher_version }}
      {%- elif rancher_helm_repo in ['rancher-latest', 'rancher-alpha'] -%}
        v{{ staging_image_version.stdout | trim }}
      {%- else -%}
        {{ rancher_image_tag }}
      {%- endif -%}

- name: Adjust Node.js version for older Rancher
  ansible.builtin.set_fact:
    nodejs_version: "22.14.0"
  when:
    - rancher_image_tag != 'head'
    - rancher_version is defined
    - rancher_version.split('.')[0] | int <= 2
    - rancher_version.split('.')[1] | int < 14

- name: Report resolved versions
  ansible.builtin.debug:
    msg: >-
      Rancher {{ rancher_version }},
      image_tag={{ rancher_image_tag_resolved }},
      chart_repo={{ rancher_chart_repo }},
      helm_repo={{ rancher_helm_repo }}
